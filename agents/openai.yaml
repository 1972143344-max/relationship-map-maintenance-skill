interface:
  display_name: "Relationship Map Maintenance"
  short_description: "Create and maintain project-scoped relationship and change-impact maps so multi-file fixes do not miss related code, config, scripts, or tests."
  default_prompt: "Use $relationship-map-maintenance with the shortest safe routed path: read the full main skill before major relationship-map actions, classify the round as `use`, `update`, or `maintain`, choose `skip`, `light`, or `full`, route through `00_index.md` before scanning shards or generated evidence, and keep initialization, lifecycle, audit, and automation detail on the low-frequency path unless this action truly needs them."
